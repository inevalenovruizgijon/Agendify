<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/nuevo-evento.css">
    
</head>

<body>
    <div class="modal-overlay active" id="eventModal">
        <div class="modal-card">
            <header class="modal-header">
                <h2>Nuevo evento</h2>
                <button class="close-modal-btn" id="closeEventModal">
                    <i class="ri-close-line"></i>
                </button>
            </header>

            <form class="event-form" id="newEventForm">
                <div class="input-group">
                    <label>Título *</label>
                    <input type="text" placeholder="Nombre del evento" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Fecha *</label>
                        <input type="date" required>
                    </div>
                    <div class="input-group">
                        <label>Hora *</label>
                        <input type="time" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Fecha límite *</label>
                    <input type="date" required>
                </div>

                <div class="input-group">
                    <label>Descripción</label>
                    <textarea placeholder="Detalles del evento..." rows="3"></textarea>
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn-create">Crear Evento</button>
                    <button type="button" class="btn-cancel" id="btnCancelEvent">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/nuevo-evento.js"></script>

</body>

</html>
